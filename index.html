<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunrise Sunset</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
 <h1>Sunrise & Sunset Dashboard</h1>
 <div class="controls">
<label for="location">Location: </label>
 <select id="location">
    <option value="Austin">Austin</option>
    <option value="Chicago">Chicago</option>
    <option value="Las Vegas">Las Vegas</option>
    <option value="Los Angeles">Los Angeles</option>
    <option value="Nashville">Nashville</option>
    <option value="New Orleans">New Orleans</option>
    <option value="New York City">New York City</option>
    <option value="Phoenix">Phoenix</option>
    <option value="San Francisco">San Francisco</option>
    <option value="Seattle">Seattle</option>
  </select>
  <button id="get-data">Get Sun Times</button>
 </div>
 <div id="error-message" style="color: red;"></div>
 <div class="dashboard-container">
 <div class="present">
     <h2>Today's Report</h2>
    <p>Date: <span id="today-date">---</span></p>
    <p>Sunrise: <span id="today-sunrise">---</span></p>
    <p>Sunset: <span id="today-sunset">---</span></p>
    <p>Dawn: <span id="today-dawn">---</span></p>
    <p>Dusk: <span id="today-dusk">---</span></p>
    <p>Solar Noon: <span id="today-solarnoon">---</span></p>
    <p>Day Length: <span id="today-day-length">---</span></p>
    <p>TimeZone: <span id="today-timezone">---</span></p>
</div>
 <div class="future">
    <h2>Tomorrow's Report</h2>
    <p>Date: <span id="tmrw-date">----</span>/p>
    <p>Sunrise: <span id="tmrw-sunrise">---</span></p>
    <p>Sunset: <span id="tmrw-sunset">---</span></p>
    <p>Dawn: <span id="tmrw-dawn">---</span></p>
    <p>Dusk: <span id="tmrw-dusk">---</span></p>
    <p>Solar Noon: <span id="tmrw-solarnoon">---</span></p>
    <p>Day Length: <span id="tmrw-day-length">---</span></p>
    <p>TimeZone: <span id="tmrw-timezone">---</span></p>
</div>
</div>
<script src="site.js"></script>
</body>
</html>
